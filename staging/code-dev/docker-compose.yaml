networks:
  traefik:
    external: true

services:
  coder:
    container_name: "coder"
    image: "ghcr.io/coder/coder:${CODER_VERSION:-latest}"
    hostname: "coder"
    networks:
      - "traefik"
    restart: "unless-stopped"
    ports:
      - "7080:7080"
    privileged: true
    environment:
      - "TZ=Etc/UTC"
      - "PROXY_DOMAIN=coder.localhost" #optional
      - "DEFAULT_WORKSPACE=/config/workspace" #optional
      - "CODER_HTTP_ADDRESS=0.0.0.0:7080"
      - "CODER_ACCESS_ADDRESS=https://coder.localhost"
      - "DOCKER_HOST=tcp://socat:2375"
    links:
      - socat
    volumes:
      - ./config:/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.coder.entrypoints=https"
      - "traefik.http.routers.coder.tls=true"
      - "traefik.http.services.coder.loadbalancer.server.port=7080"
      - "traefik.http.services.coder.loadbalancer.server.scheme=http"
      # Specify which Docker network Traefik should use for routing
      - "traefik.docker.network=traefik"
  socat:
    image: "bpack/socat"
    command: TCP4-LISTEN:2375,fork,reuseaddr UNIX-CONNECT:/var/run/docker.sock
    volumes:
       - "/Users/pmikus/.docker/run/docker.sock:/var/run/docker.sock"
    expose:
       - "2375"
    networks:
      - "traefik"